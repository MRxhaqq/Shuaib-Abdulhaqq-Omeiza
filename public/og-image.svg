<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508"/>
      <stop offset="100%" style="stop-color:#0d0d1e"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff"/>
      <stop offset="100%" style="stop-color:#00ccdd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="glowBg" cx="30%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#050508;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowBg2" cx="80%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#050508;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Glow blobs -->
  <ellipse cx="320" cy="315" rx="400" ry="300" fill="url(#glowBg)"/>
  <ellipse cx="950" cy="315" rx="350" ry="280" fill="url(#glowBg2)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(0,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="16" fill="none" stroke="rgba(0,255,255,0.12)" stroke-width="1"/>

  <!-- Corner brackets -->
  <g stroke="#00ffff" stroke-width="2" opacity="0.4">
    <polyline points="24,64 24,24 64,24"/>
    <polyline points="1136,24 1176,24 1176,64"/>
    <polyline points="24,566 24,606 64,606"/>
    <polyline points="1136,606 1176,606 1176,566"/>
  </g>

  <!-- Left side — main content -->

  <!-- System label -->
  <text x="72" y="120" font-family="monospace" font-size="14" fill="rgba(0,255,255,0.45)" letter-spacing="3">// portfolio_v1.0</text>

  <!-- Logo icon -->
  <g transform="translate(72, 148)">
    <rect width="56" height="56" rx="12" fill="#050508"/>
    <rect width="56" height="56" rx="12" fill="none" stroke="#00ffff" stroke-width="1.5"/>
    <rect x="8" y="12" width="40" height="24" rx="3" fill="none" stroke="#00ffff" stroke-width="1.5"/>
    <rect x="8" y="30" width="40" height="6" fill="#00ffff" opacity="0.1"/>
    <line x1="20" y1="44" x2="36" y2="44" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="36" x2="28" y2="44" stroke="#00ffff" stroke-width="1.5" stroke-linecap="round"/>
    <text x="28" y="28" text-anchor="middle" font-family="monospace" font-size="8" fill="#00ffff" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- Name -->
  <text x="72" y="270" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="-2">Shuaib</text>
  <text x="72" y="350" font-family="Arial Black, sans-serif" font-size="72" font-weight="900" fill="url(#cyanGrad)" letter-spacing="-2" filter="url(#softGlow)">Abdulhaqq.</text>

  <!-- Title -->
  <text x="72" y="400" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.45)" letter-spacing="1">Frontend Developer</text>

  <!-- Divider line -->
  <line x1="72" y1="428" x2="560" y2="428" stroke="rgba(0,255,255,0.15)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="72" y="462" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.4)">I build things that look good, feel smooth,</text>
  <text x="72" y="486" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.4)">and actually work.</text>

  <!-- Status badge -->
  <rect x="72" y="515" width="180" height="34" rx="17" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.25)" stroke-width="1"/>
  <circle cx="96" cy="532" r="5" fill="#00ff88" filter="url(#glow)"/>
  <text x="110" y="537" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#00ff88">Open to work</text>

  <!-- Right side — terminal card -->
  <rect x="680" y="72" width="460" height="486" rx="16" fill="#08080e" stroke="rgba(0,255,255,0.12)" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="680" y="72" width="460" height="48" rx="16" fill="#0d0d1a"/>
  <rect x="680" y="96" width="460" height="24" fill="#0d0d1a"/>
  <circle cx="712" cy="96" r="7" fill="#ff5f57"/>
  <circle cx="734" cy="96" r="7" fill="#febc2e"/>
  <circle cx="756" cy="96" r="7" fill="#28c840"/>
  <text x="840" y="101" font-family="monospace" font-size="12" fill="rgba(0,255,255,0.3)" text-anchor="middle">shuaib@portfolio ~</text>

  <!-- Terminal content -->
  <g font-family="monospace" font-size="16">
    <!-- Line 1 -->
    <text x="712" y="162" fill="rgba(0,255,255,0.5)">$</text>
    <text x="730" y="162" fill="rgba(255,255,255,0.85)">whoami</text>
    <text x="712" y="188" fill="#00ff88" dx="18">Shuaib Abdulhaqq Omeiza</text>

    <!-- Line 2 -->
    <text x="712" y="224" fill="rgba(0,255,255,0.5)">$</text>
    <text x="730" y="224" fill="rgba(255,255,255,0.85)">cat role.txt</text>
    <text x="712" y="250" fill="#00ffff" dx="18">Frontend Dev · CS Graduate</text>

    <!-- Line 3 -->
    <text x="712" y="286" fill="rgba(0,255,255,0.5)">$</text>
    <text x="730" y="286" fill="rgba(255,255,255,0.85)">cat stack.json</text>
    <text x="712" y="312" fill="#ffd700" dx="18">React · Tailwind · Framer</text>

    <!-- Line 4 -->
    <text x="712" y="348" fill="rgba(0,255,255,0.5)">$</text>
    <text x="730" y="348" fill="rgba(255,255,255,0.85)">echo $status</text>
    <text x="712" y="374" fill="#00ff88" dx="18">✓ Open to work</text>
    <rect x="850" y="359" width="10" height="18" rx="2" fill="#00ffff" opacity="0.8"/>

    <!-- Line 5 -->
    <text x="712" y="410" fill="rgba(0,255,255,0.5)">$</text>
    <text x="730" y="410" fill="rgba(255,255,255,0.85)">cat location.txt</text>
    <text x="712" y="436" fill="rgba(255,255,255,0.5)" dx="18">Nigeria 🇳🇬 · Remote-ready</text>
  </g>

  <!-- Tech pills at bottom of terminal -->
  <g transform="translate(712, 466)">
    <rect width="72" height="26" rx="13" fill="rgba(97,218,251,0.1)" stroke="rgba(97,218,251,0.25)" stroke-width="1"/>
    <text x="36" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#61dafb" text-anchor="middle">React</text>
  </g>
  <g transform="translate(796, 466)">
    <rect width="82" height="26" rx="13" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
    <text x="41" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#06b6d4" text-anchor="middle">Tailwind</text>
  </g>
  <g transform="translate(890, 466)">
    <rect width="90" height="26" rx="13" fill="rgba(0,80,255,0.1)" stroke="rgba(0,80,255,0.25)" stroke-width="1"/>
    <text x="45" y="17" font-family="Arial, sans-serif" font-size="11" font-weight="600" fill="#4d79ff" text-anchor="middle">Framer</text>
  </g>

  <!-- Bottom URL -->
  <text x="1128" y="582" font-family="monospace" font-size="13" fill="rgba(0,255,255,0.3)" text-anchor="end">mrxhaqq.vercel.app</text>
</svg>
